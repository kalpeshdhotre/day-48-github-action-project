name: Reusable - Build & Test

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
      run_tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
    outputs:
      test_result:
        description: 'Result of the test run: passed or failed'
        value: ${{ jobs.build-test.outputs.test_result }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.set-result.outputs.test_result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run-tests
        if: ${{ inputs.run_tests == true }}
        run: npm test

      - name: Set test result output
        id: set-result
        if: always()
        run: |
          if [[ "${{ inputs.run_tests }}" == "true" && "${{ steps.run-tests.outcome }}" == "failure" ]]; then
            echo "test_result=failed" >> "$GITHUB_OUTPUT"
          else
            echo "test_result=passed" >> "$GITHUB_OUTPUT"
          fi
