name: Main Branch Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

  build-test:
    needs: prep
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "26.5.0"
      run_tests: true

  docker-latest:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: github-actions-capstone
      tag: latest
      docker_username: ${{ vars.DOCKER_USERNAME }}
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  docker-sha:
    needs: [build-test, prep]
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: github-actions-capstone
      tag: sha-${{ needs.prep.outputs.short_sha }}
      docker_username: ${{ vars.DOCKER_USERNAME }}
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # --- Brownie points: DevSecOps scan against the freshly pushed :latest tag ---
  # security-scan:
  #   needs: docker-latest
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Run Trivy vulnerability scanner
  #       uses: aquasecurity/trivy-action@v0.36.0
  #       with:
  #         image-ref: ${{ needs.docker-latest.outputs.image_url }}
  #         format: 'table'
  #         output: 'trivy-report.txt'
  #         severity: 'CRITICAL'
  #         exit-code: '1'

  #     - name: Upload Trivy report
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: trivy-security-report
  #         path: trivy-report.txt

  deploy:
    needs: [docker-latest, docker-sha]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy notification
        run: 'echo "Deploying image: ${{ needs.docker-latest.outputs.image_url }} to production"'
