name: Reusable - Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name (without registry/username prefix)"
        required: true
        type: string
      tag:
        description: "Tag to apply to the image"
        required: true
        type: string
      docker_username:
        description: "Docker Hub username (not sensitive - public on every image tag)"
        required: true
        type: string
    secrets:
      docker_token:
        required: true
    outputs:
      image_url:
        description: "Full path to the pushed image"
        value: ${{ jobs.docker-build.outputs.image_url }}

jobs:
  docker-build:
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.set-url.outputs.image_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.docker_username }}
          password: ${{ secrets.docker_token }}

      # - name: Build and push image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: true
      #     tags: ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}-

      - name: Build image (local only, not pushed yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: false
          load: true
          no-cache: true
          tags: ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}

          # print Version
      - name: Show Node and npm in built image
        run: |
          docker run --rm ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }} node -v
          docker run --rm ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }} npm -v

      - name: Show bundled undici version
        run: |
          docker run --rm ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }} \
          sh -c 'cat /usr/local/lib/node_modules/npm/node_modules/undici/package.json | grep "\"version\""'

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

      - name: Push image (only reached if scan passed)
        run: "docker push ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Set image URL output
        id: set-url
        run: echo "image_url=${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
